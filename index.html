<title>特定技能×介護施設｜用語解説</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem 4rem;
}
.container { max-width: 680px; margin: 0 auto; }
.page-title { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
.page-sub { font-size: 13px; color: #999; margin-bottom: 1.5rem; }
.section-divider { border: none; border-top: 2px solid #e0e0e0; margin: 2rem 0 1.25rem; }
.section-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 0.2rem; }
.section-sub { font-size: 12px; color: #999; margin-bottom: 1rem; }
.group-label { font-size: 10px; font-weight: 600; color: #aaa; letter-spacing: 0.07em; text-transform: uppercase; margin: 1rem 0 0.5rem; }
.group-label:first-child { margin-top: 0; }
/* ── 汎用チップ ── */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 7px; padding: 7px 14px;
  border-radius: 999px; border: 1px solid #ddd; background: #fff;
  font-size: 14px; color: #1a1a1a; cursor: pointer;
  transition: background 0.15s, border-color 0.15s; user-select: none;
}
.chip:hover { background: #f0f0ee; border-color: #bbb; }
.chip.active { background: #e8f0fb; border-color: #6a9de0; color: #1a4a8a; font-weight: 500; }
.chip.star { border-color: #f5c97a; background: #fffbf0; }
.chip.star.active { background: #fef3e2; border-color: #f5a623; color: #7a5c1e; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
/* ── 詳細カード ── */
.detail-wrap { margin-top: 1rem; overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
.detail-wrap.open { max-height: 1400px; }
.detail-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 14px; padding: 1.1rem 1.25rem; }
.d-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.d-title { font-size: 17px; font-weight: 600; color: #1a1a1a; line-height: 1.4; }
.close-btn {
  width: 26px; height: 26px; border-radius: 50%; background: #f0f0ee;
  border: none; cursor: pointer; color: #888; font-size: 13px;
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.close-btn:hover { background: #e0e0de; }
.sales-tag { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-top: 0.5rem; }
.d-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-top: 0.4rem; }
.divider { border: none; border-top: 1px solid #efefef; margin: 0.7rem 0; }
.d-body { font-size: 14px; color: #555; line-height: 1.85; }
.d-body strong { color: #1a1a1a; font-weight: 600; }
.d-body ol { padding-left: 1.2rem; margin-top: 0.5rem; }
.d-body ol li { margin-bottom: 0.5rem; }
/* ── スペックカード・スクリプト ── */
.spec-card {
  background: #fffbf0; border: 1px solid #f5c97a; border-radius: 10px;
  padding: 0.85rem 1rem; margin-top: 0.75rem;
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
}
.spec-item { display: flex; flex-direction: column; gap: 2px; }
.spec-label { font-size: 10px; font-weight: 600; color: #b8870a; text-transform: uppercase; letter-spacing: 0.05em; }
.spec-value { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.script-box { background: #f0f8f4; border: 1px solid #7fd0b5; border-radius: 10px; padding: 0.85rem 1rem; margin-top: 0.85rem; font-size: 13px; color: #1a4a35; line-height: 1.8; }
.script-label { font-size: 10px; font-weight: 600; color: #0f6e56; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
/* ── 国籍 ── */
.country-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.75rem; }
.country-pill { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 10px; background: #f5f5f3; border: 1px solid #e5e5e3; }
.country-name { font-weight: 600; color: #1a1a1a; font-size: 13px; }
.country-note { font-size: 11px; color: #999; margin-top: 1px; }
/* ── ヒアリングリスト ── */
.hearing-list { display: flex; flex-direction: column; gap: 0.6rem; }
.hearing-item { display: flex; align-items: flex-start; gap: 10px; }
.hearing-num { min-width: 22px; height: 22px; border-radius: 50%; color: #fff; font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.hearing-wall { border-top: 1px dashed #e8e8e8; padding-top: 0.5rem; color: #aaa; font-size: 11px; text-align: center; }
/* ── テレアポリスト用語（内部リスト） ── */
.tele-list { display: flex; flex-direction: column; gap: 0.65rem; }
.tele-item { display: flex; align-items: flex-start; gap: 10px; }
.tele-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
/* ── アポ後アクションチップ ── */
.action-chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.action-chip {
  display: inline-flex; align-items: center; gap: 7px; padding: 7px 14px;

  transition: background 0.15s, border-color 0.15s; user-select: none;

.action-chip:hover { background: #dff0f5; border-color: #7fc8d8; }
.action-chip.active { background: #0d8fad; border-color: #0d8fad; color: #fff; font-weight: 500; }
.action-num {
  font-size: 10px; font-weight: 700; width: 17px; height: 17px;
  border-radius: 50%; background: rgba(0,0,0,0.12);
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.arrow { font-size: 13px; color: #ccc; flex-shrink: 0; }
.action-detail-wrap { margin-top: 1rem; overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
.action-detail-wrap.open { max-height: 1400px; }
/* ── フォーマットボックス ── */
.format-box { background: #f8f8f6; border: 1px solid #ddd; border-radius: 10px; padding: 0.85rem 1rem; margin-top: 0.85rem; font-size: 12.5px; color: #333; line-height: 1.85; white-space: pre-wrap; font-family: inherit; }
.format-label { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
</style>

let activeId = null;
const wordArea = document.getElementById('word-area');
const detailWrap = document.getElementById('detail-wrap');

GROUPS.forEach(group => {
  const gl = document.createElement('div');
  gl.className = 'group-label';
  gl.textContent = group.label;
  wordArea.appendChild(gl);
  const chips = document.createElement('div');
  chips.className = 'chips';
  group.terms.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (item.star ? ' star' : '');
    chip.id = 'chip-' + item.id;
    const dot = document.createElement('span');
    dot.className = 'chip-dot';
    dot.style.background = group.dotColor;
    chip.appendChild(dot);
    chip.appendChild(document.createTextNode(item.label));
    chip.addEventListener('click', () => toggleDetail(item));
    chips.appendChild(chip);
  });
  wordArea.appendChild(chips);
});

function toggleDetail(item) {
  if (activeId === item.id) { closeDetail(); return; }
  activeId = item.id;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-' + item.id).classList.add('active');
  document.getElementById('d-title').textContent = item.title;
  const ba = document.getElementById('d-badge-area');
  ba.innerHTML = '';
  if (item.salesTag) {
    const st = document.createElement('span');
    st.className = 'sales-tag';
    st.textContent = '営業ポイント：' + item.salesTag;
    st.style.background = item.salesBg; st.style.color = item.salesColor;
    ba.appendChild(st); ba.appendChild(document.createElement('br'));
  }
  if (item.badge) {
    const b = document.createElement('span');
    b.className = 'd-badge';
    b.textContent = item.badge;
    b.style.background = item.badgeBg; b.style.color = item.badgeColor;
    ba.appendChild(b);
  }
  const body = document.getElementById('d-body');
  body.innerHTML = item.body;
  if (item.hearingList) {
    const list = document.createElement('div');
    list.className = 'hearing-list';
    [
      { num:'1', color:'#A32D2D', label:'採用温度感', note:'採用予定があるか・特定技能の枠が何枠空いているか' },
      { num:'2', color:'#888', label:'担当者名' },
      { num:'3', color:'#888', label:'メールアドレス' },
      { num:'4', color:'#888', label:'希望国籍' },
      { num:'5', color:'#888', label:'希望日本語レベル' },
      { num:'6', color:'#888', label:'介護経験有無' },
      { num:'7', color:'#888', label:'寮の有無' },
    ].forEach((hi, i) => {
      if (i === 1) {
        const w = document.createElement('div'); w.className = 'hearing-wall';
        w.textContent = '── ここより下は優先度低め ──'; list.appendChild(w);
      }
      const row = document.createElement('div'); row.className = 'hearing-item';
      row.innerHTML = '<span class="hearing-num" style="background:' + hi.color + '">' + hi.num + '</span><div><strong>' + hi.label + '</strong>' + (hi.note ? '<br><span style="font-size:13px;color:#777;">' + hi.note + '</span>' : '') + '</div>';
      list.appendChild(row);
    });
    body.appendChild(list);
  }
  if (item.spec) {
    const card = document.createElement('div'); card.className = 'spec-card';
    item.spec.forEach(s => {
      const si = document.createElement('div'); si.className = 'spec-item';
      si.innerHTML = '<div class="spec-label">' + s.label + '</div><div class="spec-value">' + s.value + '</div>';
      card.appendChild(si);
    });
    body.appendChild(card);
  }
  if (item.script) {
    const sb = document.createElement('div'); sb.className = 'script-box';
    sb.innerHTML = '<div class="script-label">トーク例</div>' + item.script;
    body.appendChild(sb);
  }
  if (item.countries) {
    const row = document.createElement('div'); row.className = 'country-row';
    item.countries.forEach(c => {
      const pill = document.createElement('div'); pill.className = 'country-pill';
      pill.innerHTML = '<span style="font-size:20px;line-height:1">' + c.flag + '</span><div><div class="country-name">' + c.name + '</div><div class="country-note">' + c.note + '</div></div>';
      row.appendChild(pill);
    });
    body.appendChild(row);
  }
  // move detail card right after the clicked chip's group
  const chipEl = document.getElementById('chip-' + item.id);
  const chipsDiv = chipEl.parentElement;
  chipsDiv.parentNode.insertBefore(detailWrap, chipsDiv.nextSibling);
  detailWrap.classList.add('open');
}
function closeDetail() {
  activeId = null; detailWrap.classList.remove('open');
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
}

let activeActionId = null;
const actionArea = document.getElementById('action-chips');
const actionDetailWrap = document.getElementById('action-detail-wrap');

ACTIONS.forEach((item, i) => {
  if (i > 0) {
    const arrow = document.createElement('span'); arrow.className = 'arrow'; arrow.textContent = '›';
    actionArea.appendChild(arrow);
  }
  const chip = document.createElement('div');
  chip.className = 'action-chip';
  chip.id = 'action-chip-' + item.id;
  const num = document.createElement('span'); num.className = 'action-num'; num.textContent = i + 1;
  chip.appendChild(num);
  chip.appendChild(document.createTextNode(item.label));
  chip.addEventListener('click', () => toggleAction(item));
  actionArea.appendChild(chip);
});

function toggleAction(item) {
  if (activeActionId === item.id) { closeAction(); return; }
  activeActionId = item.id;
  document.querySelectorAll('.action-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('action-chip-' + item.id).classList.add('active');
  document.getElementById('a-title').textContent = item.title;
  const ba = document.getElementById('a-badge-area');
  ba.innerHTML = '';
  if (item.badge) {
    const b = document.createElement('span'); b.className = 'd-badge';
    b.textContent = item.badge; b.style.background = item.badgeBg; b.style.color = item.badgeColor;
    ba.appendChild(b);
  }
  const body = document.getElementById('a-body');
  body.innerHTML = item.body;
  if (item.format) {
    const fb = document.createElement('div'); fb.className = 'format-box';
    fb.innerHTML = '<div class="format-label">フォーマット</div>' + item.format.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    body.appendChild(fb);
  }
  actionDetailWrap.classList.add('open');
}
function closeAction() {
  activeActionId = null; actionDetailWrap.classList.remove('open');
  document.querySelectorAll('.action-chip').forEach(c => c.classList.remove('active'));
}
</script>
