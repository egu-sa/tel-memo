<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特定技能×介護施設｜用語解説</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem 4rem;
}
.container { max-width: 680px; margin: 0 auto; }
.page-title { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
.page-sub { font-size: 13px; color: #999; margin-bottom: 1.5rem; }
.flow-label { font-size: 11px; font-weight: 600; color: #aaa; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 0.75rem; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.chip {
  display: inline-flex; align-items: center; gap: 7px; padding: 7px 14px;
  border-radius: 999px; border: 1px solid #ddd; background: #fff;
  font-size: 14px; color: #1a1a1a; cursor: pointer;
  transition: background 0.15s, border-color 0.15s; user-select: none;
}
.chip:hover { background: #f0f0ee; border-color: #bbb; }
.chip.active { background: #e8f0fb; border-color: #6a9de0; color: #1a4a8a; font-weight: 500; }
.chip.star { border-color: #f5c97a; background: #fffbf0; }
.chip.star.active { background: #fef3e2; border-color: #f5a623; color: #7a5c1e; }
.step-num {
  font-size: 10px; font-weight: 600; width: 17px; height: 17px;
  border-radius: 50%; background: #eee; color: #999;
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.chip.active .step-num { background: rgba(26,74,138,0.15); color: #1a4a8a; }
.chip.star.active .step-num { background: rgba(245,166,35,0.2); color: #7a5c1e; }
.arrow { font-size: 13px; color: #ccc; flex-shrink: 0; }
.detail-wrap { margin-top: 1rem; overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
.detail-wrap.open { max-height: 1200px; }
.detail-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 14px; padding: 1.1rem 1.25rem; }
.d-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.d-title { font-size: 17px; font-weight: 600; color: #1a1a1a; line-height: 1.4; }
.close-btn {
  width: 26px; height: 26px; border-radius: 50%; background: #f0f0ee;
  border: none; cursor: pointer; color: #888; font-size: 13px;
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.close-btn:hover { background: #e0e0de; }
.sales-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-top: 0.5rem; }
.d-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-top: 0.4rem; }
.divider { border: none; border-top: 1px solid #efefef; margin: 0.7rem 0; }
.d-body { font-size: 14px; color: #555; line-height: 1.85; }
.d-body strong { color: #1a1a1a; font-weight: 600; }
.d-body ol { padding-left: 1.2rem; margin-top: 0.5rem; }
.d-body ol li { margin-bottom: 0.5rem; }
.spec-card {
  background: #fffbf0; border: 1px solid #f5c97a; border-radius: 10px;
  padding: 0.85rem 1rem; margin-top: 0.75rem;
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
}
.spec-item { display: flex; flex-direction: column; gap: 2px; }
.spec-label { font-size: 10px; font-weight: 600; color: #b8870a; text-transform: uppercase; letter-spacing: 0.05em; }
.spec-value { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.script-box {
  background: #f0f8f4; border: 1px solid #7fd0b5; border-radius: 10px;
  padding: 0.85rem 1rem; margin-top: 0.85rem; font-size: 13px; color: #1a4a35; line-height: 1.8;
}
.script-label { font-size: 10px; font-weight: 600; color: #0f6e56; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
.country-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.75rem; }
.country-pill { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 10px; background: #f5f5f3; border: 1px solid #e5e5e3; }
.country-name { font-weight: 600; color: #1a1a1a; font-size: 13px; }
.country-note { font-size: 11px; color: #999; margin-top: 1px; }
</style>
</head>

  { id: "grouphome", label: "グループホーム", badge: "施設種別", badgeBg: "#EEEDFE", badgeColor: "#3C3489", salesTag: "日本語力が特に重視", salesBg: "#EEEDFE", salesColor: "#3C3489", title: "グループホーム｜認知症対応型共同生活介護", body: "<strong>正式名称</strong>：認知症対応型共同生活介護<br><br>認知症の方が少人数で共同生活を送る施設。<br><br><strong>営業での狙い目</strong>：コミュニケーション能力（日本語力）が特に重視される傾向にある。N3以上の人材を紹介できる点を強調すると刺さりやすい。" },

  { id: "ninchisho", label: "認知症介護基礎研修", badge: "法律上の義務", badgeBg: "#FAEEDA", badgeColor: "#633806", title: "認知症介護 基礎研修", body: "<strong>無資格で入職した場合、入社後1年以内の受講が法律で義務づけられている研修。</strong><br><br>認知症の方への正しい対応・コミュニケーション技術を学ぶ内容。<br><br><strong>施設側の対応が必要なケース</strong>：紹介する外国人材がこの研修を未受講の場合、入社後に受講させる義務が施設側に発生する。" },

  { id: "n2", label: "N2", badge: "高レベル", badgeBg: "#E6F1FB", badgeColor: "#0C447C", title: "JLPT N2（日本語能力試験）", body: "日常会話はもちろん、やや専門的な内容まで理解できるレベル。<br><br><strong>N2のレベル感</strong>：自然な速さの会話でもほぼ問題なく対応できる。敬語もある程度使いこなせる。<br><br>N3より一段上の安心感があり、施設からの評価が高い。N1ほど稀少でなく、紹介できる人材も一定数いる。" },
  { id: "n3", label: "N3", badge: "施設が最も好むレベル", badgeBg: "#E6F1FB", badgeColor: "#0C447C", title: "JLPT N3（日本語能力試験）", body: "JLPTはN1〜N5の5段階でN1が最高レベル。<br><br><strong>N3のレベル感</strong>：日常会話が問題なくできる。利用者様やスタッフとのやり取りがスムーズ。<br><br>施設からの信頼・安心感が最も高く、採用後のトラブルも少ない傾向がある。" },
  { id: "n4", label: "N4", badge: "特定技能の最低条件", badgeBg: "#E6F1FB", badgeColor: "#0C447C", title: "JLPT N4（日本語能力試験）", body: "<strong>特定技能ビザを取得するための最低条件となる日本語レベル。</strong><br><br><strong>N4のレベル感</strong>：ゆっくり・やさしい日本語であれば基本的な会話が可能。業務指示の理解には問題ない。<br><br>N3と比べると施設側の安心感はやや下がるため、トークでは「N3以上が多い」という点を強調するとよい。" },
  {

    body: "特定技能の外国人を雇う企業に<strong>法律で義務付けられている</strong>、外国人が日本でスムーズに生活・就労するためのサポート対応全般。<br><br>本来は施設側が対応しなければならないが、<strong>弊社が委託費（15,000円/月）で全て代行する。</strong><br><br><strong>具体的な業務内容（全10項目）</strong><ol><li><strong>事前ガイダンス</strong>：入国前に労働条件や日本の生活を説明</li><li><strong>出入国の送迎</strong>：入国・帰国時の空港〜住居間の送迎</li><li><strong>住居確保・契約支援</strong>：アパート探し・銀行口座・携帯・光熱費の契約サポート</li><li><strong>生活オリエンテーション</strong>：ゴミの出し方・交通ルール・買い物など日本の生活ルールを説明</li><li><strong>公的手続きの同行</strong>：市役所での住民登録・マイナンバー・税金手続きに同行・通訳</li><li><strong>日本語学習の機会提供</strong>：日本語教室の案内・学習教材の提供</li><li><strong>相談・苦情への対応</strong>：仕事や生活の悩みを母国語で受け付け、トラブルに対応</li><li><strong>日本人との交流促進</strong>：地域の行事・お祭りなどへの参加サポート</li><li><strong>転職支援</strong>：会社都合で解雇する場合などに次の就職先を探すサポート</li><li><strong>定期面談</strong>：3ヶ月に1回以上、外国人本人・直属上司と面談を実施</li></ol>"
  },
  { id: "shokai", label: "紹介費", badge: "費用", badgeBg: "#E1F5EE", badgeColor: "#085041", title: "紹介費", body: "人材を施設にご紹介する際の手数料（一括払い）。<br><br><strong>プランA（紹介＋委託）</strong>：150,000円<br><strong>プランB（紹介のみ）</strong>：200,000円<br><br>プランBは委託費が発生しない代わりに、紹介費が高くなる設計。" },

  {

    title: "アポでどんな話をするか",
    body: "アポの目的は<strong>「求人票の確認」と「候補人材のご提案」</strong>。<br><br>訪問前に施設の求人票を確認し、特定技能に合った人材を数名ピックアップしてから伺う。",
    script: "「求人票って、特定技能用に作られてますかね？」<br><br>↓ <strong>作られていない・よくわからない場合</strong><br><br>「でしたら、詳細を少し教えていただければ、こちらでも良さそうな方を何人かピックアップしておきます。〇〇日の〇〇時はいかがでしょうか？」"
  },
];

let activeId = null;
const area = document.getElementById('chips-area');
const detailWrap = document.getElementById('detail-wrap');

TERMS.forEach((item, i) => {
  if (i > 0) {
    const arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.textContent = '›';
    area.appendChild(arrow);
  }
  const chip = document.createElement('div');
  chip.className = 'chip' + (item.star ? ' star' : '');
  chip.id = 'chip-' + item.id;
  const num = document.createElement('span');
  num.className = 'step-num';
  num.textContent = i + 1;
  chip.appendChild(num);
  chip.appendChild(document.createTextNode(item.label));
  chip.addEventListener('click', () => toggle(item));
  area.appendChild(chip);
});

function toggle(item) {
  if (activeId === item.id) { closeDetail(); return; }
  activeId = item.id;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-' + item.id).classList.add('active');
  document.getElementById('d-title').textContent = item.title;

  const ba = document.getElementById('d-badge-area');
  ba.innerHTML = '';
  if (item.salesTag) {
    const st = document.createElement('span');
    st.className = 'sales-tag';
    st.textContent = '営業ポイント：' + item.salesTag;
    st.style.background = item.salesBg;
    st.style.color = item.salesColor;
    ba.appendChild(st);
    ba.appendChild(document.createElement('br'));
  }
  if (item.badge) {
    const b = document.createElement('span');
    b.className = 'd-badge';
    b.textContent = item.badge;
    b.style.background = item.badgeBg;
    b.style.color = item.badgeColor;
    ba.appendChild(b);
  }

  const body = document.getElementById('d-body');
  body.innerHTML = item.body;

  if (item.spec) {
    const card = document.createElement('div');
    card.className = 'spec-card';
    item.spec.forEach(s => {
      const si = document.createElement('div');
      si.className = 'spec-item';
      si.innerHTML = '<div class="spec-label">' + s.label + '</div><div class="spec-value">' + s.value + '</div>';
      card.appendChild(si);
    });
    body.appendChild(card);
  }

  if (item.script) {
    const sb = document.createElement('div');
    sb.className = 'script-box';
    sb.innerHTML = '<div class="script-label">トーク例</div>' + item.script;
    body.appendChild(sb);
  }

  if (item.countries) {
    const row = document.createElement('div');
    row.className = 'country-row';
    item.countries.forEach(c => {
      const pill = document.createElement('div');
      pill.className = 'country-pill';
      pill.innerHTML = '<span style="font-size:20px;line-height:1">' + c.flag + '</span><div><div class="country-name">' + c.name + '</div><div class="country-note">' + c.note + '</div></div>';
      row.appendChild(pill);
    });
    body.appendChild(row);
  }

  detailWrap.classList.add('open');
  setTimeout(() => detailWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

function closeDetail() {
  activeId = null;
  detailWrap.classList.remove('open');
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
}
</script>
</body>
</html>
